<!DOCTYPE html>

<head>

    <title> Pie Clicker </title>

</head>
<body>
    <section id="game"><!--conatiner för själva spelet att klicka på pajen-->
        <h1> Pie Clicker </h1>

            <p> pies: </p> <P>0</P>      
        </div>

        </div>
        <div id="pie-Clicker">
            <img src="" alt="pie clicker, click to earn points">
            <p>Click this ↑</p>
        </div>
    </section>
    <script src="PieClicker.js"> </script>
</body>
